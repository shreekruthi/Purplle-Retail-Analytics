services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: store_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile

    env_file:
      - ../.env

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8000:8000"